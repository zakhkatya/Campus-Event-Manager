{% extends "base.html" %}
{% block content %}
<div class="container-xxl rounded-4 p-4 mt-4">
    <h2 class="fw-bold mb-4 ps-2">My Feedbacks</h2>
    <div class="dashboard-events-scroll pe-2">
        {% for fb in feedbacks %}
        <div class="card border-0 mb-4 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="event-img-box rounded-3 d-flex align-items-center justify-content-center bg-light">
                            <i class="bi bi-chat-left text-primary fs-3"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0">{{ fb.event.title }}</h5>
                            <small class="text-muted">{{ fb.created_at|date:"M d, Y" }}</small>
                            <span class="badge ms-2">Rating: {{ fb.rating }}/5</span>
                        </div>
                    </div>
                    <a href="{% url 'event_system:event_detail' fb.event.id %}" class="btn btn-secondary action-btn-circle rounded-pill px-4 w-auto d-flex align-items-center justify-content-center">
                        <i class="bi bi-arrow-return-left me-2"></i> View Event
                    </a>
                </div>
                <hr class="opacity-10">
                <p class="text-secondary fs-xs mb-0 ps-1">{{ fb.comment }}</p>
            </div>
        </div>
        {% empty %}
        <div class="text-center py-5">
            <i class="bi bi-chat-square-dots fs-1 opacity-25"></i>
            <p class="text-muted mt-2">You haven't submitted any feedback yet.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
