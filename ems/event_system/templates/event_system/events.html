{%extends "base.html"%}
{%block title%} My events {%endblock%}
<div class="container-xxl rounded-4"> 
    <h2 class="p-4 pb-2"> <b> My events <i class="bi bi-caret-up-fill fs-5"></i> </b> </h2>

    <div class="container">
        <div class="row d-flex">
            {% for x in '123'|make_list %}
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card border-1">
                        <div class="card-header border-0 pb-0">
                            <div class="d-flex align-items-center mb-2">
                                <i class="bi bi-person-circle fs-2 me-2"></i>
                                <div>
                                    <h6 class="fs-6 mb-0">Header</h6>
                                    <small class="text-muted">Subhead</small>
                                </div>
                            </div>

                        </div>
                        <div class="card-body p-0">
                            <div class="placeholder-card-image d-flex justify-content-center align-items-center rounded">
                                <i class="bi bi-image fs-1 text-muted"></i>
                            </div>
                        </div>
                        <div class="card-footer border-0 pt-0 pb-3 px-1">
                            <div class="container-fluid h-100">
                                <div class="row h-100">   
                                    <div class="col">
                                    <h6 class="card-title mt-2 mb-0"> <b> Event Name </b> </h6>
                                    <p class = "mb-0"> <i class="bi bi-clock"></i> 9:00 - 10:00 </p>
                                    <div class = "badge p-2 rounded-pill"> Event Category </div>
                                    </div>    
                                <div class="col d-flex justify-content-end align-items-end">
                                    <a href="#" class="btn btn-sm px-3 py-2 btn-secondary rounded-pill d-flex gap-2">
                                        <i class="bi bi-arrow-return-left"></i> About
                                    </a>   
                                </div>        
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
