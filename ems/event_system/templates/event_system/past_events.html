{% extends "base.html" %}
{% block content %}
<div class="container-xxl rounded-4 p-4 mt-4 shadow-sm bg-light">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="fw-bold mb-0 text-dark">Past Events</h2>
    </div>
    
    <div class="row g-4">
        {% for event in events %}
            {% include "event_system/components/event_card.html" with event=event %}
        {% empty %}
            <div class="col-12 text-center py-5">
                <p class="text-muted fs-5 italic">No past events found.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
