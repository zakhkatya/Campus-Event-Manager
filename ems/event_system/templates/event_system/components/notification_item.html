<div class="card mb-3 border-0 rounded-4">
    <div class="card-body p-3">
        <div class="row align-items-center">
            <div class="col-auto">
                <div class="notification-icon-circle">
                    <i class="bi bi-bell-fill fs-4"></i>
                </div>
            </div>
            
            <div class="col ps-2">
                <div class="d-flex justify-content-between align-items-start">
                    <p class="text-muted mb-0 fs-xs lh-sm fw-medium">
                        {{ notification.message }}
                    </p>
                    <span class="text-muted fs-xxs opacity-75 justify-content-end">{{ notification.created_at|timesince }} ago</span>
                </div>
            </div>
        </div>
    </div>
</div>
