{% extends "base.html" %}
{% block content %}
<div class="container-xxl rounded-4 p-4 mt-4">
    <h2 class="fw-bold mb-4 ps-2">My Feedback</h2>
    <div class="dashboard-events-scroll pe-2">
        {% for fb in feedbacks %}
        <div class="card border-0 mb-4 rounded-4">
            <div class="card-body p-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center justify-content-center">
                            <i class="bi bi-chat-left fs-2"></i>
                        </div>
                        <div>
                            <a href="{% url 'event_system:event_detail' fb.event.id %}"
                                class="text-dark fs-6 fw-bolder link-secondary link-underline link-underline-secondary link-offset-1 link-underline-opacity-0 link-underline-opacity-100-hover">
                                    {{ fb.event.title }}</a>
                                    <br>
                            <small class="text-muted">{{ fb.created_at|date:"d M Y" }}</small>
                            <div class="text-warning">
                                {% for i in "12345"|make_list %}
                                    <i class="bi bi-star{% if forloop.counter <= fb.rating %}-fill{% endif %} fs-xxs"></i>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                  
                </div>
                <hr class="opacity-10">
                <p class="text-secondary fs-xs mb-0 ps-1">{{ fb.comment }}</p>
            </div>
        </div>
        {% empty %}
        <div class="text-center py-5">
            <i class="bi bi-chat-square-dots fs-1 opacity-25"></i>
            <p class="text-muted mt-2">You haven't submitted any feedback yet.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
