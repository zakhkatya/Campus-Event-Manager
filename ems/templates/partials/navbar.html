{% load static %}
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid flex-column">

        <div class="pt-2 text-center w-100">
            <a class="navbar-brand text-dark" href="{% url 'event_system:home' %}">
                <h1 class="fs-3 mb-0 fw-bold">Campus Event Manager</h1> 
                <p class="fs-5 mb-0">Polytechnic Institute of Bragança</p>
            </a>
        </div>

        <div class="position-absolute top-0 end-0">
            
            {% if user.is_authenticated %}
            <div class="dropdown my-4 me-5 p-0">
            <button class="row row-cols-2 user rounded-4 border-0 bg-transparent" type="button" data-bs-toggle="dropdown" aria-expanded="false" data-bs-display="static">
                <div class="col-2 p-0 ps-1">
                    <i class="bi bi-person-circle fs-2 text-muted"></i>
                </div>

                <div class="col text-start pt-1 lh-sm ms-1 pe-0">
                    <span class="text-muted fs-6 fw-bolder">{{ user.email }}</span>
                    <p class="text-muted fs-6 mb-0 text-capitalize">{{ user.role }}</p>
                </div>
            </button>

            <ul class="dropdown-menu dropdown-menu-start shadow-sm rounded-4 border-0 mt-2 text-end m-0 p-2">
                <li class="mb-2">
                    <a class="dropdown-item bg-transparent p-0 ps-1" href="#">
                        Edit profile <i class="bi bi-person fs-5 btn-primary rounded-3 ms-1 p-2 py-1" type="button"></i>
                    </a>
                </li>

                <li>
                    <form method="post" action="{% url 'userauth:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item bg-transparent p-0">
                            Logout <i class="bi bi-box-arrow-right fs-5 btn-primary btn-lg rounded-3 ms-1 p-2 py-1" type="button"></i>
                        </button>
                    </form>
                </li>
            </ul>
            </div>
            {% endif %}
        </div>
    </div>
</nav>
