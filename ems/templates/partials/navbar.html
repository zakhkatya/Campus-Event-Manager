{% load static %}
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid flex-column">

        <div class="pt-4 text-center w-100">
            <a class="navbar-brand text-dark" href="{% url 'event_system:home' %}">
                <h1 class="fs-2 mb-0 fw-bold">Campus Event Manager</h1> 
                <p class="fs-5 mb-0">Polytechnic Institute of Bragança</p>
            </a>
        </div>

        <div class="w-100 d-flex justify-content-end align-items-center" style="position: absolute; top: 10px; right: 10px;">
            
            {% if user.is_authenticated %}
                <span class="text-dark me-2">
                    Welcome, {{ user.email }}
                </span>
                
                <form action="{% url 'userauth:logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                </form>

            {% elif request.path != "/" and request.path != "" %} 
                <a href="{% url 'userauth:login' %}" class="btn btn-primary btn-sm me-2">Login</a>
                <a href="{% url 'userauth:register' %}" class="btn btn-success btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
