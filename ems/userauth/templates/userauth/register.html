{% extends "userauth/base_auth.html" %}
{% load django_bootstrap5 %}
{% block content %}
<div class="container-sm rounded p-3 shadow-md position-fixed w-25 register">
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form layout="vertical" %}
    {% bootstrap_button "Create account" button_type="submit" button_class="btn-primary" %}
</form>
</div>
{%endblock%}
