{% extends "base.html" %}
{% block body_class %}no-scroll-page{% endblock %}
{% block content %}
<div class="container-xxl rounded-4 p-5 mt-4 shadow-sm bg-light">
    <h2 class="text-center fw-bold mb-5">My Profile</h2>
    
    <form method="post" enctype="multipart/form-data" class="col-lg-8 mx-auto">
        {% csrf_token %}
        
        <div class="text-center mb-5 position-relative">
            <div class="avatar-wrapper mx-auto mb-3">
                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}" alt="Profile">
                {% else %}
                    <img src="https://ui-avatars.com/api/?name={{ user.first_name }}+{{ user.last_name }}" alt="Default">
                {% endif %}
            </div>
            <label for="id_avatar" class="btn change-photo-btn rounded-pill shadow-sm">
                <i class="bi bi-camera me-2"></i> Change profile picture
            </label>
            <input type="file" name="avatar" id="id_avatar" class="d-none">
        </div>

        <div class="profile-fields px-md-5">
            <div class="row align-items-center mb-4">
                <div class="col-md-3 text-md-end">
                    <label class="fw-bold fs-5 text-dark pe-2">First name:</label>
                </div>
                <div class="col-md-9">
                    <div class="custom-input-container shadow-sm">
                        {{ form.first_name }}
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                </div>
            </div>

            <div class="row align-items-center mb-4">
                <div class="col-md-3 text-md-end">
                    <label class="fw-bold fs-5 text-dark pe-2">Surname:</label>
                </div>
                <div class="col-md-9">
                    <div class="custom-input-container shadow-sm">
                        {{ form.last_name }}
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                </div>
            </div>

            <div class="row align-items-center mb-4">
                <div class="col-md-3 text-md-end">
                    <label class="fw-bold fs-5 text-dark pe-2">Email:</label>
                </div>
                <div class="col-md-9">
                    <div class="custom-input-container shadow-sm">
                        {{ form.email }}
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                </div>
            </div>

            <div class="row align-items-center mb-4">
                <div class="col-md-3 text-md-end">
                    <label class="fw-bold fs-5 text-dark pe-2">Password:</label>
                </div>
                <div class="col-md-9">
                    <div class="custom-input-container shadow-sm">
                        {{ form.new_password }}
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow-sm fs-5">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
